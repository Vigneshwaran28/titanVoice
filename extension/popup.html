<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 220px;
      font-family: system-ui, sans-serif;
      padding: 12px;
      background: #14171a;
      color: #f0f0f0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px;
      font-weight: 600;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    #startBtn { background: #2e7d32; color: white; }
    #stopBtn { background: #c62828; color: white; }
    #status { font-size: 12px; margin-top: 8px; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>TitanHand</h1>
  <button id="startBtn">Start Listening</button>
  <button id="stopBtn">Stop</button>
  <div id="status">Idle</div>
  <script src="popup.js"></script>
</body>
</html>
